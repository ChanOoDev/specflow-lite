openapi: "3.0.3"
info:
  title: SpecFlow Lite - Projects API
  version: "1.0.0"
  description: REST API for project management. All endpoints require Supabase Auth session cookie.
servers:
  - url: /api
    description: Relative to the Next.js application

paths:
  /projects:
    get:
      summary: List projects
      operationId: listProjects
      tags: [Projects]
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Partial name match (case-insensitive)
        - name: status
          in: query
          schema:
            type: string
            enum: [active, paused, completed, archived]
        - name: includeArchived
          in: query
          schema:
            type: boolean
            default: false
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        "200":
          description: Paginated project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      summary: Create project
      operationId: createProject
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectInput"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Duplicate project name
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: NAME_DUPLICATE
                  message:
                    type: string
                    example: A project with this name already exists

  /projects/{projectId}:
    get:
      summary: Get project detail
      operationId: getProject
      tags: [Projects]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Project detail with computed counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      summary: Update project metadata
      operationId: updateProject
      tags: [Projects]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectInput"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Optimistic lock conflict
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: CONFLICT
                  message:
                    type: string
                    example: This project was updated by someone else. Please refresh and try again.

    delete:
      summary: Soft-delete project
      operationId: deleteProject
      tags: [Projects]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Project soft-deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{projectId}/archive:
    post:
      summary: Archive or restore a project
      operationId: toggleArchive
      tags: [Projects]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [archive, restore]
              required: [action]
      responses:
        "200":
          description: Archive/restore successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  schemas:
    ProjectResponse:
      type: object
      required: [id, name, description, status, owner_id, created_at, updated_at, counts]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, paused, completed, archived]
        owner_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        archived_at:
          type: string
          format: date-time
          nullable: true
        counts:
          type: object
          properties:
            requirements:
              type: integer
              minimum: 0
            specifications:
              type: integer
              minimum: 0
            tasks:
              type: integer
              minimum: 0
            completedTasks:
              type: integer
              minimum: 0

    ProjectListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProjectResponse"
        pagination:
          type: object
          properties:
            page:
              type: integer
              minimum: 1
            pageSize:
              type: integer
              minimum: 1
              maximum: 50
            total:
              type: integer
              minimum: 0
            totalPages:
              type: integer
              minimum: 0

    CreateProjectInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 2000
          default: ""

    UpdateProjectInput:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 2000
        status:
          type: string
          enum: [active, paused, completed, archived]
        updated_at:
          type: string
          format: date-time
          description: Client's last-known updated_at for optimistic locking

  responses:
    Unauthorized:
      description: User is not authenticated
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: UNAUTHORIZED

    NotFound:
      description: Project not found or user is not owner
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: NOT_FOUND

    ValidationError:
      description: Input validation failed
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: VALIDATION_ERROR
              message:
                type: string
              details:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string
